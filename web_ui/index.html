<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GANalyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
    <body>
        <div class="container">
            <div class="box">  <!-- Generator Input -->
                <h1 class="top_bar">Generator Input</h1>
                <div style="height:20%;flex-direction: row; display: flex;">

                    <div style="width:50%; flex-direction: row;display: flex;">
                        <div style="width:90%; flex-direction: row;display: flex; background-color: black; border-radius: 50px; padding: 5px;margin-left: 2.5%">
                            <p style="width:30%; flex-direction: row;display: flex; color: white;justify-content: center; align-items: center;">
                                Set Random Values
                            </p>

                            <div style="width:30%; flex-direction: column;display: flex;">
                                <div style="height:50%">
                                    <input type="range" id="sliderMuValue" min="-10" max="10" value="0" step="0.01" oninput="handleSliderMuValue(this.value)"/>
                                </div>

                                <div style="height:50%; display:flex; justify-content:center; align-items:flex-start;">
                                    <p style="margin:0; color: white">mu = <span id="sliderMuValueLabel">0</span></p>
                                </div>
                            </div>

                            <div style="width:30%; height:100%;flex-direction: column;display: flex;">
                                <div style="height:50%;">
                                    <input type="range" id="sliderSigmaValue" min="0" max="5" value="1" step="0.01" oninput="handleSliderSigmaValue(this.value)"/>
                                </div>

                                <div style="height:50%; display:flex; justify-content:center; align-items:flex-start;">
                                    <p style="margin:0; color: white">sigma = <span id="sliderSigmaValueLabel">1</span></p>
                                </div>
                            </div>

                            <button style="border-radius: 20px; border: 1px solid white; width:10%; flex-direction: row;display: flex; background-color: grey; display:flex; justify-content:center; align-items:center;" onclick="re_randomize()">
                                Regenerate
                            </button>
                        </div>
                    </div>

                    <div style="width:50%; flex-direction: row;display: flex;">

                        <div style="width:90%; flex-direction: row;display: flex; background-color: black; border-radius: 50px; padding: 5px;margin-left: 2.5%">

                            <p style="width:50%; flex-direction: row;display: flex; color: white;justify-content: center; align-items: center;">
                                Set All Values Constant
                            </p>

                            <div style="width:50%; flex-direction: column;display: flex;">
                                <div style="height:50%">
                                    <input type="range" id="sliderConstantValue" min="-5" max="5" value="0" step="0.01" oninput="handleSliderConstantValue(this.value)"/>
                                </div>

                                <div style="height:50%; display:flex; justify-content:center; align-items:flex-start;">
                                    <p style="margin:0; color: white">k = <span id="sliderConstantValueLabel">0</span></p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div style = "height:60%; width: 100%">
                    <div style = "height:90%; width: 90%; margin-left: 5%; margin-top: 0.1%">
                        <div id="sliders_grid" style="height:100%; width: 100%; background-color: black; ">
                        </div>
                    </div>
                </div>
            </div>

            <div class="box">  <!-- Generator Visualization -->
                <h1 class="top_bar">Generator Visualization</h1>
                <div style = "width:100%; height:80%;flex-direction: row; display: flex;">
                    <div style = "width : 25%; background-color: black;"> <!-- epoch slider-->
                    </div>
                    <div style = "width : 25%; background-color: grey;display: flex; justify-content: center; align-items: center;"><!-- input visualization-->
                        <div id="grid_input_generator"> </div>
                    </div>

                    <div style = "width : 25%; background-color: black;"><!-- inside visualization-->
                    </div>

                    <div style = "width : 25%; background-color: grey; display: flex; justify-content: center; align-items: center;"><!-- output visualization-->
                        <div id="grid_visual_generator"></div>
                    </div>

                </div>
            </div>

            <div class="box">   <!-- Discriminator visualization -->
                <h1 class="top_bar">Discriminator Visualization</h1>

                <div style = "width:100%; height:80%;flex-direction: row; display: flex;">
                    <div style = "width : 25%; background-color: black;"> <!-- epoch slider-->
                    </div>
                    <div style = "width : 25%; background-color: grey;"><!-- input visualization-->

                    </div>
                    <div style = "width : 25%; background-color: black;"><!-- inside visualization-->

                    </div>
                    <div style = "width : 25%; background-color: grey;"><!-- output visualization-->

                    </div>

                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
